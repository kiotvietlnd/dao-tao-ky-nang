<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ Học Tập: Kỹ năng Tiếp nhận & Xử lý vấn đề hiệu quả</title>
    
    <!-- Fonts: Inter is primary -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#1e3a8a',
                            orange: '#f97316',
                            sky: '#e0f2fe',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { font-family: 'Inter', sans-serif !important; }

        /* 5D Animated Gradient Background */
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(-45deg, #e0f2fe, #bae6fd, #fed7aa, #ffedd5, #e0e7ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Orbs for 5D Depth */
        .orb-1 {
            position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
            border-radius: 50%; filter: blur(60px); animation: float 12s ease-in-out infinite; z-index: 0;
        }
        .orb-2 {
            position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(30,58,138,0.1) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px); animation: float 15s ease-in-out infinite reverse; z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Glassmorphism Slide Content */
        .slide-content {
            width: 1280px;
            height: 720px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1.5rem;
            box-shadow: 0 30px 60px -12px rgba(30, 58, 138, 0.15), 0 0 40px rgba(255,255,255,0.5) inset;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 40px 60px;
        }

        .title-slide-content {
            background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.4);
            color: white;
            padding: 60px;
        }

        .logo-container {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 50;
        }
        .logo-img { height: 40px; width: auto; transition: all 0.3s ease; }
        .logo-invert { filter: brightness(0) invert(1) drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="orb-1"></div>
    <div class="orb-2"></div>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { motion, AnimatePresence } = window.Motion;

        const Icon = ({ name, size = 24, className = "" }) => {
            const spanRef = React.useRef(null);
            React.useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    lucide.createIcons({ root: spanRef.current, attrs: { width: size, height: size } });
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center shrink-0" />;
        };

        const Logo = ({ isTitle }) => (
            <div className="logo-container">
                <img 
                    src="https://logo.kiotviet.vn/KiotViet-Logo-Horizontal.svg" 
                    alt="KiotViet Logo" 
                    className={`logo-img ${isTitle ? 'logo-invert' : ''}`}
                    referrerPolicy="no-referrer"
                />
            </div>
        );

        const Slide = ({ children, className = "", isTitle = false }) => (
            <div className={`slide-content ${isTitle ? 'title-slide-content' : ''} ${className}`}>
                <Logo isTitle={isTitle} />
                {!isTitle && (
                    <>
                        <div className="absolute -top-12 -right-12 w-48 h-48 bg-orange-500/10 rounded-full blur-3xl pointer-events-none" />
                        <div className="absolute -bottom-24 -left-24 w-72 h-72 bg-blue-900/5 rounded-full blur-3xl pointer-events-none" />
                    </>
                )}
                <div className="relative z-10 flex flex-col h-full w-full">
                    {children}
                </div>
            </div>
        );

        const SlideTitle = ({ children }) => (
            <h2 className="text-3xl font-extrabold mb-6 text-brand-blue uppercase border-l-8 border-brand-orange pl-4 tracking-tight shrink-0 whitespace-nowrap">
                {children}
            </h2>
        );

        // Component dành riêng cho Workbook: Dòng kẻ để viết
        const WriteSpace = ({ lines = 1, className="" }) => (
            <div className={`flex flex-col gap-8 mt-6 mb-4 w-full ${className}`}>
                {[...Array(lines)].map((_, i) => (
                    <div key={i} className="w-full border-b-2 border-slate-300 border-dashed"></div>
                ))}
            </div>
        );

        // Component Checkbox
        const CheckboxGroup = ({ options }) => (
            <div className="flex gap-6 my-4">
                {options.map((opt, i) => (
                    <label key={i} className="flex items-center gap-2 text-slate-800 font-bold text-[18px]">
                        <div className="w-5 h-5 border-2 border-slate-400 rounded-sm flex-shrink-0 bg-white shadow-inner"></div>
                        {opt}
                    </label>
                ))}
            </div>
        );

        const Presentation = () => {
            const [currentSlide, setCurrentSlide] = React.useState(0);
            
            const slides = [
                // Slide 1
                <Slide key="1" isTitle={true}>
                    <div className="flex flex-col justify-center items-center h-full relative z-10 text-center">
                        <div className="bg-white/20 px-8 py-3 rounded-full border border-white/30 mb-8 backdrop-blur-sm">
                            <span className="text-2xl font-bold tracking-widest text-white uppercase">1. Sổ học tập</span>
                        </div>
                        <motion.h1 
                            initial={{ opacity: 0, y: -50 }}
                            animate={{ opacity: 1, y: 0 }}
                            className="font-black uppercase mb-8 drop-shadow-lg"
                        >
                            <span className="text-[48px] leading-tight text-white block mb-2 whitespace-nowrap">Kỹ năng Tiếp nhận & Xử lý vấn đề hiệu quả</span>
                            <span className="text-[48px] leading-tight block text-brand-orange">Trong cuộc gọi đầu tiên</span>
                        </motion.h1>
                        <motion.p 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 0.3 }}
                            className="text-3xl text-blue-100 mb-12 font-medium"
                        >
                            Dành cho nhân viên DVKH Hotline
                        </motion.p>
                        <div className="mt-8">
                            <span className="bg-gradient-to-r from-brand-orange to-orange-500 text-white px-8 py-3.5 rounded-full font-bold text-xl flex items-center gap-3 w-fit mx-auto shadow-xl shadow-orange-500/30 whitespace-nowrap">
                                <Icon name="graduation-cap" /> Learning & Development Department
                            </span>
                        </div>
                    </div>
                </Slide>,

                // Slide 2
                <Slide key="2">
                    <SlideTitle>2. Quy trình cuộc gọi Hotline</SlideTitle>
                    <div className="flex-grow flex flex-col justify-center relative w-full pt-4">
                        <div className="relative w-full h-[280px] flex items-center">
                            <div className="absolute top-[85px] left-[5%] right-[5%] h-3 bg-blue-100 rounded-full shadow-inner" />
                            <div className="absolute top-[85px] left-[5%] w-[35%] h-3 bg-gradient-to-r from-brand-orange to-orange-400 rounded-full shadow-[0_0_15px_rgba(249,115,22,0.4)]" />

                            <div className="flex justify-between relative z-10 w-full px-4">
                                {[
                                    { step: "B.1", title: <>Chào hỏi.</>, active: false },
                                    { step: "B.2", title: <>Khai thác vấn đề<br/>& hỗ trợ.</>, active: true },
                                    { step: "B.3", title: <>Xác nhận<br/>hỗ trợ xong.</>, active: false },
                                    { step: "B.4", title: <>Chào kết thúc.</>, active: false },
                                    { step: "B.5", title: <>Tạo ticket<br/>ghi nhận trên<br/>hệ thống.</>, active: false }
                                ].map((item, i) => (
                                    <div key={i} className="flex flex-col items-center w-[19%] relative group">
                                        <div className={`w-16 h-16 rounded-full border-[5px] flex items-center justify-center font-black text-xl z-10 shadow-lg transition-transform duration-300 group-hover:-translate-y-2 ${item.active ? 'bg-brand-orange border-white text-white scale-125 shadow-orange-500/50' : 'bg-white border-brand-blue text-brand-blue'}`}>
                                            {item.step}
                                        </div>
                                        <div className={`w-4 h-4 rotate-45 mt-4 -mb-2 z-0 ${item.active ? 'bg-brand-orange' : 'bg-white'}`}></div>
                                        <div className={`px-2 py-4 rounded-xl text-center w-full h-[100px] flex items-center justify-center shadow-md border ${item.active ? 'bg-orange-50 border-orange-200' : 'bg-white border-slate-100'}`}>
                                            <p className={`text-[16px] font-bold leading-snug ${item.active ? 'text-brand-orange' : 'text-slate-800'}`}>
                                                {item.title}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </Slide>,

                // Slide 3
                <Slide key="3">
                    <SlideTitle>3. Mục tiêu bài học</SlideTitle>
                    <div className="grid grid-cols-12 gap-10 flex-grow items-center">
                        <div className="col-span-8 pr-4 w-full">
                            <p className="text-2xl font-bold text-brand-blue mb-6">Giúp nhân viên DVKH thực hiện được:</p>
                            <ul className="space-y-4">
                                <li className="bg-white/70 p-4 rounded-2xl shadow-sm border border-white flex gap-4 items-center whitespace-nowrap">
                                    <div className="bg-brand-orange text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl shrink-0">1</div>
                                    <span className="text-slate-800 text-[20px] font-medium">Điều tiết cảm xúc khi tiếp nhận cuộc gọi</span>
                                </li>
                                <li className="bg-white/70 p-4 rounded-2xl shadow-sm border border-white flex gap-4 items-center whitespace-nowrap">
                                    <div className="bg-brand-orange text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl shrink-0">2</div>
                                    <span className="text-slate-800 text-[20px] font-medium">Ghi nhận đúng cốt lõi vấn đề của khách hàng</span>
                                </li>
                                <li className="bg-white/70 p-4 rounded-2xl shadow-sm border border-white flex gap-4 items-center whitespace-nowrap">
                                    <div className="bg-brand-orange text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl shrink-0">3</div>
                                    <span className="text-slate-800 text-[20px] font-medium">Xử lý vấn đề hiệu quả trong cuộc gọi đầu tiên</span>
                                </li>
                            </ul>
                            <div className="mt-6 p-5 bg-gradient-to-r from-brand-blue to-blue-800 border-l-8 border-brand-orange rounded-r-xl shadow-lg w-full">
                                <p className="text-[17px] text-white font-bold leading-relaxed w-full">=> Gia tăng tỷ lệ hoàn thành ngay trong cuộc gọi đầu tiên và hạn chế căng thẳng của khách hàng.</p>
                            </div>
                        </div>
                        <div className="col-span-4 rounded-2xl overflow-hidden shadow-2xl h-[380px] border-4 border-white">
                            <img 
                                src="https://images.unsplash.com/photo-1552581234-26160f608093?auto=format&fit=crop&q=80&w=800" 
                                alt="Target" 
                                className="w-full h-full object-cover"
                            />
                        </div>
                    </div>
                </Slide>,

                // Slide 4
                <Slide key="4">
                    <SlideTitle>4. Nguyên tắc tham gia</SlideTitle>
                    <div className="flex flex-col flex-grow justify-center w-full">
                        <div className="grid grid-cols-3 gap-8 w-full h-[350px]">
                            {[
                                { icon: "unlock", title: "Cởi mở", desc: "Không có câu trả lời đúng hay sai, chỉ có cách giải quyết phù hợp trong từng tình huống." },
                                { icon: "hand-metal", title: "Chủ động", desc: "Tham gia chia sẻ, đặt câu hỏi & thực hành để nhận được phản hồi giúp hoàn thiện kỹ năng." },
                                { icon: "heart-handshake", title: "Tích cực", desc: "Xây dựng môi trường học tập an&nbsp;toàn, lắng nghe và tôn trọng ý kiến khác biệt." }
                            ].map((item, i) => (
                                <div key={i} className="bg-white/60 backdrop-blur-md border border-white rounded-2xl p-8 flex flex-col items-center text-center shadow-lg hover:-translate-y-2 transition-transform duration-300 h-full justify-center">
                                    <div className="w-24 h-24 bg-gradient-to-br from-orange-100 to-orange-50 rounded-full flex items-center justify-center text-brand-orange mb-6 shadow-inner shrink-0">
                                        <Icon name={item.icon} size={48} />
                                    </div>
                                    <h3 className="text-2xl font-bold text-brand-blue mb-4 whitespace-nowrap">{item.title}</h3>
                                    <p className="text-[18px] text-slate-700 leading-relaxed" dangerouslySetInnerHTML={{ __html: item.desc }}></p>
                                </div>
                            ))}
                        </div>
                    </div>
                </Slide>,

                // Slide 5
                <Slide key="5">
                    <SlideTitle>5. Hoạt động 1: Nhận diện cảm xúc & tác động</SlideTitle>
                    <div className="flex flex-col flex-grow w-full h-full">
                        <div className="bg-white/90 p-6 rounded-3xl border border-white shadow-xl h-full flex flex-col">
                            <div className="text-[18px] text-slate-800 leading-snug mb-4 border-b-2 border-slate-100 pb-4 shrink-0">
                                <p>- Trong 1 tuần trực hotline gần đây, hãy nhớ lại một cuộc gọi khiến bạn khó xử nhất. Trong cuộc gọi đó, khách hàng gọi lên vì vấn đề gì và thái độ của họ như thế nào?</p>
                                <p className="mt-2">- Chia sẻ lại tình huống trên với người bên cạnh và cùng thảo luận 3 câu hỏi:</p>
                            </div>
                            
                            <div className="flex-grow flex flex-col justify-around">
                                <div className="w-full">
                                    <p className="text-[20px] font-bold text-brand-blue">1. Cảm xúc của bạn như thế nào trong 5s đầu tiên?</p>
                                    <WriteSpace lines={2} />
                                </div>
                                <div className="w-full">
                                    <p className="text-[20px] font-bold text-brand-blue">2. Phản ứng tiếp theo của bạn ngay sau cảm xúc đó là gì?</p>
                                    <WriteSpace lines={2} />
                                </div>
                                <div className="w-full">
                                    <p className="text-[20px] font-bold text-brand-blue">3. Bạn nhận thấy khi ở trạng thái cảm xúc căng thẳng hoặc tiêu cực, điều gì hoặc năng lực nào của bạn bị ảnh hưởng?</p>
                                    <WriteSpace lines={2} />
                                </div>
                            </div>
                        </div>
                    </div>
                </Slide>,

                // Slide 6
                <Slide key="6">
                    <SlideTitle>6. Tác động của cảm xúc tới khả năng lắng nghe</SlideTitle>
                    <div className="flex-grow flex flex-col justify-center h-full">
                        <div className="bg-brand-blue text-white p-8 rounded-3xl shadow-xl border border-blue-400/20 mb-8 flex items-start gap-6">
                            <div className="bg-white/20 p-4 rounded-2xl shrink-0"><Icon name="brain" size={40} className="text-brand-orange" /></div>
                            <p className="text-[22px] leading-relaxed font-medium">
                                Khi ở trạng thái cảm xúc tiêu cực căng thẳng hoặc bị công kích cá nhân, não kích hoạt <span className="text-brand-orange font-bold">chế độ phòng vệ hoặc đối đầu</span>, màng lọc ngăn cản khiến chúng ta không còn khả năng đủ khả năng lắng nghe.
                            </p>
                        </div>
                        
                        <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-3">
                            <Icon name="alert-triangle" className="text-red-500" /> Biểu hiện của việc mất kiểm soát cảm xúc và không còn khả năng nghe:
                        </h3>
                        
                        <div className="grid grid-cols-2 gap-6">
                            {[
                                "Ngắt lời để giải thích",
                                "Dùng từ “Nhưng mà…”, \"sao lại thế\", \"chị cứ bình tĩnh\"... các từ ngữ kích hoạt thêm xung đột",
                                "Nói nhanh, căng hơn bình thường",
                                "Giọng cao lên"
                            ].map((item, i) => (
                                <div key={i} className="bg-white/80 p-5 rounded-2xl border border-white shadow-md flex items-center gap-4">
                                    <Icon name="x-circle" className="text-red-500 shrink-0" size={28} />
                                    <p className="text-[19px] text-slate-700">{item}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </Slide>,

                // Slide 7
                <Slide key="7">
                    <SlideTitle>7. Hậu quả của mất kiểm soát cảm xúc</SlideTitle>
                    <div className="grid grid-cols-2 gap-8 flex-grow h-full items-center justify-center pb-6">
                        <div className="bg-white/90 rounded-3xl p-8 border border-white shadow-xl flex flex-col justify-start h-full max-h-[400px]">
                            <div className="flex items-center gap-4 mb-6 pb-4 border-b-2 border-slate-100 shrink-0">
                                <div className="bg-red-100 p-3 rounded-full"><Icon name="ear-off" className="text-red-600" size={28} /></div>
                                <h3 className="text-[24px] font-bold text-brand-blue">Hậu quả với khả năng lắng nghe</h3>
                            </div>
                            <ul className="space-y-4 text-[18px] text-slate-700 font-medium h-full flex flex-col justify-center">
                                <li className="flex gap-3 items-start"><Icon name="chevron-right" className="text-brand-orange mt-1 shrink-0" /> <span className="leading-snug">Thu hẹp chú ý (chỉ nghe điều khó chịu)</span></li>
                                <li className="flex gap-3 items-start"><Icon name="chevron-right" className="text-brand-orange mt-1 shrink-0" /> <span className="leading-snug">Dễ hiểu sai ý (tự gán nghĩa, tự diễn dịch điều khách&nbsp;nói)</span></li>
                                <li className="flex gap-3 items-start"><Icon name="chevron-right" className="text-brand-orange mt-1 shrink-0" /> <span className="leading-snug">Giảm khả năng xử lý thông tin, nhất là khi khách trình bày vấn đề phức tạp nhiều thông tin chồng chéo, khó khăn để hệ thống xâu chuỗi thông tin lại</span></li>
                            </ul>
                        </div>
                        
                        <div className="bg-blue-50/90 rounded-3xl p-8 border border-white shadow-xl flex flex-col justify-start h-full max-h-[400px]">
                            <div className="flex items-center gap-4 mb-6 pb-4 border-b-2 border-blue-200 shrink-0">
                                <div className="bg-brand-blue p-3 rounded-full"><Icon name="briefcase" className="text-white" size={28} /></div>
                                <h3 className="text-[24px] font-bold text-brand-blue">Hệ quả với công việc</h3>
                            </div>
                            <ul className="space-y-4 text-[18px] text-slate-700 font-medium h-full flex flex-col justify-center">
                                <li className="flex gap-3 items-start"><Icon name="chevron-right" className="text-brand-orange mt-1 shrink-0" /> <span className="leading-snug">Không đồng cảm được với khách hàng, chỉ nghe bề&nbsp;mặt</span></li>
                                <li className="flex gap-3 items-start"><Icon name="chevron-right" className="text-brand-orange mt-1 shrink-0" /> <span className="leading-snug">Không hiểu được vấn đề thực sự của khách hàng, không đặt được câu hỏi tốt</span></li>
                                <li className="flex gap-3 items-start"><Icon name="chevron-right" className="text-brand-orange mt-1 shrink-0" /> <span className="leading-snug">Không giải quyết được triệt để vấn&nbsp;đề</span></li>
                                <li className="flex gap-3 items-start"><Icon name="chevron-right" className="text-brand-orange mt-1 shrink-0" /> <span className="leading-snug">Làm tăng lỗi giao tiếp, tăng sự căng thẳng khó chịu từ khách&nbsp;hàng</span></li>
                            </ul>
                        </div>
                    </div>
                </Slide>,

                // Slide 8
                <Slide key="8">
                    <SlideTitle>8. Hai bước xử lý nhanh cảm xúc tiêu cực</SlideTitle>
