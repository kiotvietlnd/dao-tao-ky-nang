<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Lịch Kỹ Năng 2026 | Trainer OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Font Xinh Yêu Mềm Mại */
        body { font-family: 'Quicksand', sans-serif; background-color: #fcf9f8; color: #4a4a4a; }
        .font-inter { font-family: 'Inter', sans-serif; }
        
        .cute-card { background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #fef2f2; }
        .cute-input { width: 100%; background: #fffafb; border: 2px solid #fce7f3; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-weight: 600; color: #57534e; outline: none; transition: all 0.3s ease; }
        .cute-input:focus { border-color: #f9a8d4; background: #ffffff; box-shadow: 0 0 0 4px rgba(249, 168, 212, 0.15); }
        
        /* Pastel Colors */
        .bg-pastel-pink { background-color: #fdf2f8; color: #db2777; border: 1px solid #fbcfe8; }
        .bg-pastel-mint { background-color: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
        
        /* Custom Tooltip XỊN, TO & KHÔNG BỊ CHE */
        .tooltip-container { position: relative; cursor: pointer; width: 100%; }
        .tooltip-box { 
            visibility: hidden; opacity: 0; 
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%) translateY(10px);
            background: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 20px 40px rgba(0,0,0,0.15); 
            border-radius: 16px; padding: 16px; width: max-content; min-width: 220px;
            z-index: 99999; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; /* Tránh cản trở chuột */
        }
        /* Mũi tên trỏ xuống của Tooltip */
        .tooltip-box::after {
            content: ''; position: absolute; top: 100%; left: 50%; margin-left: -8px;
            border-width: 8px; border-style: solid; border-color: #ffffff transparent transparent transparent;
        }
        .tooltip-container:hover .tooltip-box { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Grid Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
        .day-header { text-align: center; font-size: 11px; font-weight: 700; color: #a8a29e; padding-bottom: 6px; }
        
        .date-cell { 
            aspect-ratio: 1; /* HÌNH VUÔNG */
            border-radius: 8px; display: flex; flex-direction: column; padding: 4px; 
            background: white; border: 1.5px solid #fafaf9; 
            position: relative; z-index: 1; transition: all 0.2s ease;
        }
        .date-cell:hover { 
            border-color: #fce7f3; box-shadow: 0 4px 15px rgba(251, 207, 232, 0.4); 
            z-index: 50; /* Đẩy thẻ lên trên để Tooltip không bao giờ bị che */
            transform: scale(1.05); 
        }
        .date-num { font-size: 12px; font-weight: 700; color: #78716c; margin-bottom: 2px; text-align: right; padding-right: 2px;}
        .empty { pointer-events: none; background: transparent; border-color: transparent; }
        .weekend { background-color: #fafaf9; }
        .weekend .date-num { color: #d6d3d1; }
        
        .date-cell-content { flex-grow: 1; display: flex; flex-direction: column; gap: 3px; }

        /* Event Badges */
        .event-badge { font-size: 9.5px; font-family: 'Inter', sans-serif; font-weight: 700; padding: 4px 6px; border-radius: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; text-align: left;}

        /* Modal Blur */
        .modal-overlay { backdrop-filter: blur(4px); }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6 relative">

    <div class="max-w-[1400px] mx-auto">
        <!-- HEADER (CÓ LOGO KIOTVIET) -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 cute-card p-4 md:px-6">
            <div class="flex items-center gap-4">
                <!-- LOGO KIOTVIET -->
                <img src="https://logo.kiotviet.vn/KiotViet-Logo-Horizontal.svg" alt="KiotViet" class="h-8 md:h-10 object-contain">
                <div class="w-px h-8 bg-stone-200 hidden md:block"></div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-slate-700">Lịch Đào tạo 2026</h1>
                    <p id="sync-status" class="text-xs font-semibold text-slate-400 mt-0.5"><i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu...</p>
                </div>
            </div>
            <div class="flex gap-2 bg-stone-50 p-1.5 rounded-2xl shrink-0">
                <button onclick="switchTab('calendar')" id="btn-calendar" class="px-5 py-2.5 rounded-xl font-bold transition-all text-white bg-pink-500 shadow-md shadow-pink-200"><i class="fas fa-calendar-alt mr-1"></i> Xem Cả Năm</button>
                <button onclick="switchTab('settings')" id="btn-settings" class="px-5 py-2.5 rounded-xl font-bold transition-all text-stone-500 hover:bg-stone-100 hover:text-stone-700"><i class="fas fa-sliders-h mr-1"></i> Cài Đặt Khóa</button>
            </div>
        </div>

        <!-- ================= MÀN HÌNH XEM LỊCH (12 THÁNG) ================= -->
        <div id="view-calendar" class="block fade-in">
            <div class="flex flex-wrap gap-4 items-center justify-between mb-6">
                <div class="flex gap-5 bg-white px-5 py-3 rounded-2xl shadow-sm border border-stone-100">
                    <span class="text-sm font-bold text-stone-400 mt-0.5">🌸 Giảng viên:</span>
                    <div class="flex items-center gap-2"><span class="w-5 h-5 rounded-lg bg-pastel-pink"></span><span class="font-bold text-sm text-pink-600">Mrs. Trang</span></div>
                    <div class="flex items-center gap-2"><span class="w-5 h-5 rounded-lg bg-pastel-mint"></span><span class="font-bold text-sm text-emerald-600">Mrs. Phương</span></div>
                </div>
                <button onclick="loadDataFromCloud()" class="px-5 py-2.5 bg-white rounded-xl shadow-sm border border-stone-100 text-stone-500 hover:text-pink-500 hover:border-pink-200 transition-all font-bold text-sm flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i> Làm mới Lịch
                </button>
            </div>
            
            <!-- Vùng chứa 12 tháng -->
            <div id="calendar-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-10">
                <!-- Javascript render 12 cái card tháng vào đây -->
            </div>
        </div>

        <!-- ================= MÀN HÌNH CÀI ĐẶT ================= -->
        <div id="view-settings" class="hidden max-w-4xl mx-auto">
            
            <!-- Cài đặt API -->
            <div class="cute-card p-6 mb-6 bg-pink-50/30 border-pink-100 flex gap-4 items-center">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-pink-500 shrink-0 shadow-sm"><i class="fas fa-cloud-upload-alt"></i></div>
                <div class="flex-grow">
                    <input type="text" id="api-url-input" class="cute-input font-mono text-xs !py-2 !px-3" placeholder="Link API Google Sheets (Để mọi người cùng xem lịch)">
                </div>
                <button onclick="saveApiUrl()" class="px-6 py-2 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-700 shadow-sm">Lưu API</button>
            </div>

            <!-- Setup Theo Tháng -->
            <div class="cute-card p-6 md:p-8">
                <div class="flex justify-between items-center border-b-2 border-stone-100 pb-5 mb-6">
                    <h2 class="text-xl font-bold text-slate-700 flex items-center gap-2">🌿 Lên Lịch Dạy Theo Tháng</h2>
                    <div class="flex items-center gap-3">
                        <button onclick="openCourseModal()" class="px-4 py-2 bg-stone-100 text-stone-600 font-bold rounded-xl hover:bg-pink-100 hover:text-pink-600 transition-colors"><i class="fas fa-book-open mr-2"></i>Quản lý Khóa</button>
                        <select id="settingMonthSelect" onchange="renderMonthSettings()" class="cute-input w-36 text-emerald-600 !py-2">
                            <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option><option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option><option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option><option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
                        </select>
                    </div>
                </div>

                <div id="monthly-events-container" class="space-y-3 mb-6">
                    <!-- Danh sách các lớp trong tháng render ở đây -->
                </div>

                <button onclick="addEmptyRow()" class="w-full py-4 rounded-2xl border-2 border-dashed border-pink-200 text-pink-500 font-bold hover:bg-pink-50 transition-colors flex items-center justify-center gap-2 mb-8">
                    <i class="fas fa-plus-circle"></i> Thêm 1 lịch dạy trong tháng này
                </button>

                <div class="border-t-2 border-stone-100 pt-6 flex justify-end items-center">
                    <button onclick="saveMonthToCloud()" class="px-8 py-3 bg-emerald-500 text-white font-bold rounded-xl shadow-lg shadow-emerald-200 hover:bg-emerald-600 hover:-translate-y-0.5 transition-all flex items-center gap-2">
                        <i class="fas fa-save"></i> Lưu Lịch Lên Google Sheets
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- ================= POPUP (MODAL) QUẢN LÝ KHÓA HỌC ================= -->
    <div id="courseModal" class="fixed inset-0 bg-slate-900/40 modal-overlay hidden items-center justify-center z-50 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl transform scale-95 transition-transform duration-300" id="courseModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-700">🌸 Thêm Khóa Mới</h3>
                <button onclick="closeCourseModal()" class="w-8 h-8 rounded-full bg-stone-100 text-stone-500 flex items-center justify-center hover:bg-rose-100 hover:text-rose-500 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="new-course-name" class="cute-input" placeholder="Tên khóa (VD: Kỹ năng Giao tiếp)">
                <button onclick="addCourse()" class="px-5 bg-pink-500 text-white rounded-2xl font-bold shadow-md hover:bg-pink-600"><i class="fas fa-plus"></i></button>
            </div>

            <p class="text-xs font-bold text-stone-400 uppercase mb-3 ml-2">Danh sách Khóa hiện tại</p>
            <div id="course-list-modal" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                <!-- Danh sách khóa -->
            </div>
        </div>
    </div>

    <script>
        const year = 2026;
        const monthNames = ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"];
        const dayNames = ["T2", "T3", "T4", "T5", "T6", "T7", "CN"];
        
        let globalData = {
            courses: ["Đào tạo Hội nhập", "Kỹ năng Giao tiếp"],
            monthly: {} 
        };

        // --- ĐIỀU HƯỚNG TABS ---
        function switchTab(tab) {
            document.getElementById('view-calendar').classList.toggle('hidden', tab !== 'calendar');
            document.getElementById('view-settings').classList.toggle('hidden', tab !== 'settings');
            
            const btnCal = document.getElementById('btn-calendar');
            const btnSet = document.getElementById('btn-settings');
            
            if(tab === 'calendar') {
                btnCal.className = 'px-5 py-2.5 rounded-xl font-bold transition-all text-white bg-pink-500 shadow-md shadow-pink-200';
                btnSet.className = 'px-5 py-2.5 rounded-xl font-bold transition-all text-stone-500 hover:bg-stone-100 hover:text-stone-700';
                renderCalendar();
            } else {
                btnSet.className = 'px-5 py-2.5 rounded-xl font-bold transition-all text-white bg-pink-500 shadow-md shadow-pink-200';
                btnCal.className = 'px-5 py-2.5 rounded-xl font-bold transition-all text-stone-500 hover:bg-stone-100 hover:text-stone-700';
                renderMonthSettings();
            }
        }

        // --- POPUP QUẢN LÝ KHÓA ---
        const modal = document.getElementById('courseModal');
        const modalContent = document.getElementById('courseModalContent');

        function openCourseModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
            renderCourseListModal();
        }

        function closeCourseModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
            renderMonthSettings(); 
        }

        function addCourse() {
            const val = document.getElementById('new-course-name').value.trim();
            if(!val) return;
            if(globalData.courses.includes(val)) return alert("Khóa này đã tồn tại!");
            globalData.courses.push(val);
            document.getElementById('new-course-name').value = '';
            renderCourseListModal();
        }

        function removeCourse(index) {
            globalData.courses.splice(index, 1);
            renderCourseListModal();
        }

        function renderCourseListModal() {
            const list = document.getElementById('course-list-modal');
            list.innerHTML = globalData.courses.map((c, i) => `
                <div class="flex justify-between items-center bg-stone-50 p-3 rounded-2xl border border-stone-100">
                    <span class="text-sm font-bold text-stone-600 ml-2">${c}</span>
                    <button onclick="removeCourse(${i})" class="w-8 h-8 rounded-xl bg-white shadow-sm text-stone-400 hover:text-rose-500 transition-colors flex items-center justify-center"><i class="fas fa-trash-alt text-xs"></i></button>
                </div>
            `).join('');
        }

        // --- CÀI ĐẶT LỊCH THÁNG ---
        function renderMonthSettings() {
            const month = document.getElementById('settingMonthSelect').value;
            const key = `${year}-${month}`;
            const events = globalData.monthly[key] || [];
            
            const container = document.getElementById('monthly-events-container');
            container.innerHTML = '';

            if(events.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-stone-400 font-medium">Chưa có lịch nào trong tháng này 🌸<br><span class="text-xs">Bấm nút bên dưới để thêm mới</span></div>`;
            } else {
                events.forEach((ev, idx) => addRowToDOM(ev, idx));
            }
        }

        function getCourseOptionsHTML(selectedCourse) {
            return globalData.courses.map(c => `<option value="${c}" ${c === selectedCourse ? 'selected' : ''}>${c}</option>`).join('');
        }

        function addRowToDOM(evData, idx) {
            const container = document.getElementById('monthly-events-container');
            if(container.innerHTML.includes('Chưa có lịch')) container.innerHTML = '';

            const rowId = `row-${idx}`;
            const div = document.createElement('div');
            div.className = "flex flex-col md:flex-row items-center gap-3 bg-white p-3 rounded-2xl shadow-sm border border-stone-100";
            div.id = rowId;

            const monthStr = document.getElementById('settingMonthSelect').value;
            const monthNum = parseInt(monthStr);
            const mm = String(monthNum).padStart(2, '0');
            const lastDay = new Date(year, monthNum, 0).getDate(); 

            const minDate = `${year}-${mm}-01`;
            const maxDate = `${year}-${mm}-${lastDay}`;
            
            const displayDate = evData.date || minDate;

            div.innerHTML = `
                <div class="w-full md:w-40 shrink-0">
                    <label class="text-[10px] uppercase font-bold text-stone-400 mb-1 ml-1 block">Ngày dạy</label>
                    <input type="date" class="cute-input !py-2 !rounded-xl event-date" value="${displayDate}" min="${minDate}" max="${maxDate}">
                </div>
                <div class="w-full flex-grow">
                    <label class="text-[10px] uppercase font-bold text-stone-400 mb-1 ml-1 block">Chọn Khóa học</label>
                    <select class="cute-input !py-2 !rounded-xl event-course font-bold text-slate-700">
                        ${getCourseOptionsHTML(evData.course)}
                    </select>
                </div>
                <div class="w-full md:w-56 shrink-0">
                    <label class="text-[10px] uppercase font-bold text-stone-400 mb-1 ml-1 block">Giảng viên</label>
                    <select class="cute-input !py-2 !rounded-xl event-trainer font-bold">
                        <option value="trang" class="text-pink-600" ${evData.trainer === 'trang' ? 'selected' : ''}>🌸 Mrs. Trang (Đỏ)</option>
                        <option value="phuong" class="text-emerald-600" ${evData.trainer === 'phuong' ? 'selected' : ''}>🌿 Mrs. Phương (Xanh)</option>
                    </select>
                </div>
                <div class="w-full md:w-auto flex justify-end mt-4 md:mt-5">
                    <button onclick="document.getElementById('${rowId}').remove()" class="w-10 h-10 rounded-xl bg-stone-50 text-stone-400 hover:bg-rose-50 hover:text-rose-500 transition-colors flex items-center justify-center"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
            container.appendChild(div);
        }

        function addEmptyRow() {
            addRowToDOM({ date: '', course: globalData.courses[0] || '', trainer: 'trang' }, Date.now());
        }

        // --- RENDER XEM LỊCH (12 THÁNG) ---
        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = ''; 

            for (let month = 1; month <= 12; month++) {
                
                const monthCard = document.createElement('div');
                monthCard.className = 'cute-card p-3 md:p-4 bg-white';
                
                let html = `<h2 class="text-center font-bold text-slate-700 text-sm mb-3 uppercase tracking-wider">${monthNames[month - 1]}</h2>`;
                
                html += `<div class="calendar-grid mb-1">`;
                dayNames.forEach(day => { html += `<div class="day-header">${day}</div>`; });
                html += `</div><div class="calendar-grid">`;

                const daysInMonth = new Date(year, month, 0).getDate();
                const firstDayIndex = new Date(year, month - 1, 1).getDay();
                const offset = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 

                for (let i = 0; i < offset; i++) { html += `<div class="date-cell empty"></div>`; }

                const key = `${year}-${month}`;
                const monthEvents = globalData.monthly[key] || [];

                const daysMap = {}; 
                monthEvents.forEach(ev => {
                    if(!ev.date) return;
                    const sDate = new Date(ev.date);
                    
                    // CHỈ LẤY ĐÚNG 1 NGÀY BẠN CÀI ĐẶT (Không kéo dài cả tuần nữa)
                    if(sDate.getMonth() + 1 === month && sDate.getFullYear() === year) {
                        const dNum = sDate.getDate();
                        if(!daysMap[dNum]) daysMap[dNum] = [];
                        daysMap[dNum].push(ev);
                    }
                });

                for (let day = 1; day <= daysInMonth; day++) {
                    const currentDayIndex = (offset + day - 1) % 7;
                    const isWeekend = currentDayIndex === 5 || currentDayIndex === 6; 
                    
                    let badgesHtml = '';
                    if(daysMap[day]) {
                        const uniqueEvents = [...new Map(daysMap[day].map(item => [item.course+item.trainer, item])).values()];
                        
                        uniqueEvents.forEach(ev => {
                            const bgClass = ev.trainer === 'trang' ? 'bg-pastel-pink' : 'bg-pastel-mint';
                            const tName = ev.trainer === 'trang' ? '🌸 Trần Linh Trang' : '🌿 Nguyễn T. Thu Phương';
                            const tColor = ev.trainer === 'trang' ? 'text-pink-600' : 'text-emerald-600';
                            
                            // CHÚ Ý: TOOLTIP đã được mang ra ngoài, bọc nguyên cái badge để đảm bảo không bị cắt
                            badgesHtml += `
                                <div class="tooltip-container w-full">
                                    <div class="event-badge ${bgClass}">${ev.course}</div>
                                    <div class="tooltip-box">
                                        <div class="text-xs font-inter text-slate-500 mb-1">Người giảng dạy:</div>
                                        <div class="text-base font-bold font-inter ${tColor} mb-3">${tName}</div>
                                        <div class="text-xs font-inter text-slate-500 mb-1">Khóa đào tạo:</div>
                                        <div class="text-sm font-bold font-inter text-slate-800 whitespace-normal break-words max-w-[200px]">${ev.course}</div>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    html += `
                        <div class="date-cell ${isWeekend ? 'weekend' : ''}">
                            <div class="date-num">${day}</div>
                            <div class="date-cell-content">
                                ${badgesHtml}
                            </div>
                        </div>
                    `;
                }

                html += `</div>`; 
                monthCard.innerHTML = html;
                container.appendChild(monthCard);
            }
        }

        // --- XỬ LÝ LƯU & CLOUD ---
        function saveApiUrl() {
            localStorage.setItem('kv_cute_api', document.getElementById('api-url-input').value.trim());
            alert("✨ Đã lưu Link API!");
        }

        async function loadDataFromCloud() {
            const apiUrl = localStorage.getItem('kv_cute_api') || "";
            document.getElementById('api-url-input').value = apiUrl;
            const statusEl = document.getElementById('sync-status');

            if (apiUrl) {
                statusEl.innerHTML = '<i class="fas fa-sync fa-spin text-pink-500"></i> <span class="text-pink-500">Đang đồng bộ...</span>';
                try {
                    const noCacheUrl = apiUrl + (apiUrl.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                    const response = await fetch(noCacheUrl);
                    const data = await response.json();
                    
                    if(data.courses && data.monthly) {
                        globalData = data;
                        localStorage.setItem('kv_cute_data', JSON.stringify(globalData));
                        statusEl.innerHTML = '<i class="fas fa-cloud-check text-emerald-500"></i> <span class="text-emerald-600">Đã đồng bộ Cloud</span>';
                    } else throw new Error("Sai cấu trúc Data");
                } catch (e) {
                    loadLocalData();
                    statusEl.innerHTML = '<i class="fas fa-exclamation-circle text-amber-500"></i> <span class="text-amber-600">Dùng data cá nhân (Lỗi mạng/Data trống)</span>';
                }
            } else {
                loadLocalData();
                statusEl.innerHTML = '<i class="fas fa-laptop text-stone-400"></i> <span class="text-stone-500">Đang dùng dữ liệu Local</span>';
            }
            
            renderCalendar();
            renderMonthSettings();
        }

        function loadLocalData() {
            const local = JSON.parse(localStorage.getItem('kv_cute_data'));
            if(local && local.courses && local.monthly) globalData = local;
        }

        async function saveMonthToCloud() {
            const month = document.getElementById('settingMonthSelect').value;
            const key = `${year}-${month}`;
            const monthData = [];

            const rows = document.querySelectorAll('#monthly-events-container > div[id^="row-"]');
            rows.forEach(row => {
                const date = row.querySelector('.event-date').value;
                const course = row.querySelector('.event-course').value;
                const trainer = row.querySelector('.event-trainer').value;
                if(date && course) monthData.push({ date, course, trainer });
            });

            globalData.monthly[key] = monthData;
            localStorage.setItem('kv_cute_data', JSON.stringify(globalData));

            const apiUrl = document.getElementById('api-url-input').value.trim();
            if (apiUrl) {
                document.getElementById('sync-status').innerHTML = '<i class="fas fa-sync fa-spin text-pink-500"></i> <span class="text-pink-500">Đang lưu lên Cloud...</span>';
                try {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify(globalData), headers: {'Content-Type': 'text/plain;charset=utf-8'} });
                    alert('🌸 Lưu thành công! Hệ thống đã được đồng bộ.');
                    loadDataFromCloud();
                } catch (e) {
                    alert('Lỗi kết nối Cloud. Đã lưu ở máy bạn.');
                }
            } else {
                alert('✨ Đã lưu vào máy cá nhân! (Nhập Link API để đồng bộ chung nhé)');
                renderMonthSettings();
            }
        }

        // --- KHỞI ĐỘNG ---
        window.onload = () => {
            const currentMonth = new Date().getMonth() + 1;
            document.getElementById('settingMonthSelect').value = currentMonth;
            loadDataFromCloud();
        };
    </script>
</body>
</html>
