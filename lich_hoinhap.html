<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Hội Nhập 2026 | Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .saas-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .saas-input { width: 100%; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px 14px; font-size: 13px; outline: none; }
        .saas-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        
        /* Grid Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
        .day-header { text-align: center; font-size: 11px; font-weight: 700; color: #10b981; padding-bottom: 8px; }
        .date-cell { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #475569; position: relative; border: 1px solid transparent;}
        .empty { pointer-events: none; }
        .weekend { color: #cbd5e1; background-color: #f8fafc; border-color: #f1f5f9; }
        
        /* Colors GV */
        .bg-trang { background-color: #ef4444 !important; color: #ffffff !important; box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3); border-radius: 4px;}
        .bg-phuong { background-color: #10b981 !important; color: #ffffff !important; box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3); border-radius: 4px;}

        .tab-btn { padding: 8px 16px; font-weight: 600; font-size: 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s;}
        .tab-btn.active { background-color: #2563eb; color: white; }
        .tab-btn.inactive { background-color: #f1f5f9; color: #64748b; }
        .tab-btn.inactive:hover { background-color: #e2e8f0; color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- HEADER & TABS -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-800"><i class="far fa-calendar-alt text-blue-600 mr-2"></i> Lịch Hội Nhập 2026</h1>
                <p id="sync-status" class="text-xs font-semibold text-slate-500 mt-1 flex items-center gap-1"><i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu...</p>
            </div>
            <div class="flex gap-2 bg-slate-100 p-1 rounded-lg">
                <button onclick="switchTab('calendar')" id="btn-calendar" class="tab-btn active"><i class="fas fa-th-large mr-1"></i> Xem Lịch</button>
                <button onclick="switchTab('settings')" id="btn-settings" class="tab-btn inactive"><i class="fas fa-cog mr-1"></i> Cài Đặt</button>
            </div>
        </div>

        <!-- VIEW LỊCH (CALENDAR TAB) -->
        <div id="view-calendar" class="block">
            <div class="flex flex-wrap gap-4 items-center justify-end mb-6 bg-slate-50 p-3 rounded-lg border border-slate-200">
                <span class="text-xs font-bold text-slate-500 uppercase">Giảng viên:</span>
                <div class="flex items-center gap-2"><span class="w-5 h-5 rounded bg-red-500 shadow-sm"></span><span class="font-bold text-sm text-red-600">Mrs. Trang</span></div>
                <div class="flex items-center gap-2"><span class="w-5 h-5 rounded bg-emerald-500 shadow-sm"></span><span class="font-bold text-sm text-emerald-600">Mrs. Phương</span></div>
                <div class="w-px h-6 bg-slate-300 mx-2"></div>
                <button onclick="loadDataFromCloud()" class="text-xs font-bold text-blue-600 hover:underline"><i class="fas fa-sync-alt"></i> Làm mới Lịch</button>
            </div>
            <div id="calendar-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </div>

        <!-- VIEW CÀI ĐẶT (SETTINGS TAB) -->
        <div id="view-settings" class="hidden max-w-3xl mx-auto">
            <div class="saas-card p-6 mb-6 border-blue-200 bg-blue-50/50">
                <h3 class="font-bold text-blue-800 mb-2"><i class="fas fa-cloud text-blue-600 mr-2"></i>Link API Đồng Bộ (Google Sheets)</h3>
                <p class="text-xs text-blue-600 mb-3">Dán link Google Apps Script vào đây để mọi người cùng xem chung 1 lịch. Nếu để trống, lịch chỉ lưu tạm trên máy bạn.</p>
                <input type="text" id="api-url-input" class="saas-input border-blue-300 font-mono text-xs" placeholder="https://script.google.com/macros/s/..../exec">
            </div>

            <div class="saas-card p-6">
                <div class="flex justify-between items-center border-b border-slate-200 pb-4 mb-6">
                    <h2 class="text-lg font-bold">Cấu hình Giảng Viên theo Tháng</h2>
                    <select id="monthSelect" onchange="loadSettingsView()" class="saas-input w-40 font-bold text-blue-600 cursor-pointer">
                        <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option><option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option><option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option><option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
                    </select>
                </div>
                
                <div class="space-y-3" id="weeks-container"></div>
                
                <div class="mt-6 pt-4 border-t border-slate-200 flex justify-end">
                    <button onclick="saveDataToCloud()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-lg shadow-md transition-colors flex items-center gap-2">
                        <i class="fas fa-save"></i> Lưu Lịch Lên Hệ Thống
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const year = 2026;
        const monthNames = ["THÁNG 1", "THÁNG 2", "THÁNG 3", "THÁNG 4", "THÁNG 5", "THÁNG 6", "THÁNG 7", "THÁNG 8", "THÁNG 9", "THÁNG 10", "THÁNG 11", "THÁNG 12"];
        const dayNames = ["T2", "T3", "T4", "T5", "T6", "T7", "CN"];
        
        let allCalendarData = {};

        // --- ĐIỀU HƯỚNG TABS ---
        function switchTab(tab) {
            document.getElementById('view-calendar').classList.toggle('hidden', tab !== 'calendar');
            document.getElementById('view-settings').classList.toggle('hidden', tab !== 'settings');
            
            document.getElementById('btn-calendar').className = tab === 'calendar' ? 'tab-btn active' : 'tab-btn inactive';
            document.getElementById('btn-settings').className = tab === 'settings' ? 'tab-btn active' : 'tab-btn inactive';
        }

        // --- XỬ LÝ DỮ LIỆU ĐÁM MÂY (CLOUD) ---
        async function loadDataFromCloud() {
            const apiUrl = localStorage.getItem('kv_onboard_api') || "";
            document.getElementById('api-url-input').value = apiUrl;
            const statusEl = document.getElementById('sync-status');

            if (apiUrl) {
                statusEl.innerHTML = '<i class="fas fa-sync fa-spin text-blue-500"></i> <span class="text-blue-500">Đang đồng bộ dữ liệu Cloud...</span>';
                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    allCalendarData = data;
                    localStorage.setItem('kv_onboard_calendar', JSON.stringify(data));
                    statusEl.innerHTML = '<i class="fas fa-cloud-check text-emerald-500"></i> <span class="text-emerald-600">Đã đồng bộ với hệ thống chung (Google Sheets)</span>';
                } catch (e) {
                    allCalendarData = JSON.parse(localStorage.getItem('kv_onboard_calendar')) || {};
                    statusEl.innerHTML = '<i class="fas fa-exclamation-triangle text-amber-500"></i> <span class="text-amber-600">Lỗi mạng, đang dùng dữ liệu cũ trên máy</span>';
                }
            } else {
                allCalendarData = JSON.parse(localStorage.getItem('kv_onboard_calendar')) || {};
                statusEl.innerHTML = '<i class="fas fa-hdd text-slate-400"></i> <span class="text-slate-500">Chưa có Link API. Dữ liệu chỉ lưu trên máy cá nhân.</span>';
            }
            renderCalendar();
            loadSettingsView();
        }

        async function saveDataToCloud() {
            const apiUrl = document.getElementById('api-url-input').value.trim();
            localStorage.setItem('kv_onboard_api', apiUrl);

            const month = document.getElementById('monthSelect').value;
            const key = `${year}-${month}`;
            const monthData = [];

            for(let i = 1; i <= 5; i++) {
                monthData.push({
                    date: document.getElementById(`date-w${i}`).value,
                    trainer: document.getElementById(`trainer-w${i}`).value
                });
            }
            allCalendarData[key] = monthData;
            localStorage.setItem('kv_onboard_calendar', JSON.stringify(allCalendarData));

            if (apiUrl) {
                document.getElementById('sync-status').innerHTML = '<i class="fas fa-sync fa-spin text-blue-500"></i> <span class="text-blue-500">Đang lưu lên hệ thống chung...</span>';
                try {
                    await fetch(apiUrl, { method: 'POST', body: JSON.stringify(allCalendarData), headers: {'Content-Type': 'text/plain;charset=utf-8'} });
                    alert('Đã lưu thành công lên hệ thống chung! Mọi người đã có thể thấy lịch mới.');
                    loadDataFromCloud();
                    switchTab('calendar');
                } catch (e) {
                    alert('Lỗi kết nối. Lịch tạm thời được lưu ở máy bạn.');
                }
            } else {
                alert('Đã lưu vào máy cá nhân! (Hãy thêm Link API để đồng bộ chung)');
                loadDataFromCloud();
                switchTab('calendar');
            }
        }

        // --- RENDER GIAO DIỆN CÀI ĐẶT ---
        function renderSettingsInputs() {
            const container = document.getElementById('weeks-container');
            container.innerHTML = '';
            for(let i = 1; i <= 5; i++) {
                container.innerHTML += `
                    <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <div class="w-16 font-bold text-slate-500 text-xs">Tuần ${i}</div>
                        <div class="flex-1">
                            <label class="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Ngày bắt đầu (Thứ 2)</label>
                            <input type="date" id="date-w${i}" class="saas-input cursor-pointer py-1.5">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] uppercase font-bold text-slate-400 mb-1 block">Phân công GV</label>
                            <select id="trainer-w${i}" class="saas-input cursor-pointer font-semibold py-1.5">
                                <option value="">-- Trống (Không dạy) --</option>
                                <option value="trang" class="text-red-600 font-bold">Trần Linh Trang (Đỏ)</option>
                                <option value="phuong" class="text-emerald-600 font-bold">Nguyễn T. Thu Phương (Xanh)</option>
                            </select>
                        </div>
                    </div>
                `;
            }
        }

        function loadSettingsView() {
            const month = document.getElementById('monthSelect').value;
            const key = `${year}-${month}`;
            const data = allCalendarData[key] || [];
            for(let i = 1; i <= 5; i++) {
                const weekData = data[i-1] || { date: '', trainer: '' };
                document.getElementById(`date-w${i}`).value = weekData.date;
                document.getElementById(`trainer-w${i}`).value = weekData.trainer;
            }
        }

        // --- RENDER GIAO DIỆN LỊCH ---
        function getHighlightedDays(monthData) {
            const activeDays = {};
            monthData.forEach(week => {
                if(week.date && week.trainer) {
                    const startDate = new Date(week.date);
                    for(let i = 0; i < 5; i++) {
                        const targetDate = new Date(startDate);
                        targetDate.setDate(startDate.getDate() + i);
                        const dateStr = `${targetDate.getFullYear()}-${String(targetDate.getMonth()+1).padStart(2, '0')}-${String(targetDate.getDate()).padStart(2, '0')}`;
                        activeDays[dateStr] = week.trainer;
                    }
                }
            });
            return activeDays;
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';

            for (let month = 1; month <= 12; month++) {
                const monthKey = `${year}-${month}`;
                const monthData = allCalendarData[monthKey] || [];
                const activeDays = getHighlightedDays(monthData);

                const monthCard = document.createElement('div');
                monthCard.className = 'saas-card p-4';
                
                let html = `<h2 class="text-center font-bold text-slate-800 text-sm mb-3">${monthNames[month - 1]}</h2>`;
                html += `<div class="calendar-grid mb-1">`;
                dayNames.forEach(day => { html += `<div class="day-header">${day}</div>`; });
                html += `</div><div class="calendar-grid">`;

                const daysInMonth = new Date(year, month, 0).getDate();
                const firstDayIndex = new Date(year, month - 1, 1).getDay();
                const offset = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

                for (let i = 0; i < offset; i++) { html += `<div class="date-cell empty"></div>`; }

                for (let day = 1; day <= daysInMonth; day++) {
                    const currentDayIndex = (offset + day - 1) % 7;
                    const isWeekend = currentDayIndex === 5 || currentDayIndex === 6; 
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    
                    let bgClass = '';
                    if(activeDays[dateStr]) { bgClass = activeDays[dateStr] === 'trang' ? 'bg-trang' : 'bg-phuong'; }

                    html += `<div class="date-cell ${isWeekend && !bgClass ? 'weekend' : ''} ${bgClass}">${day}</div>`;
                }

                html += `</div>`;
                monthCard.innerHTML = html;
                container.appendChild(monthCard);
            }
        }

        // --- KHỞI ĐỘNG ---
        window.onload = () => {
            renderSettingsInputs();
            document.getElementById('monthSelect').value = new Date().getMonth() + 1;
            loadDataFromCloud();
        };
    </script>
</body>
</html>
